name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftFormat & SwiftLint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install linters
        run: brew install swiftformat swiftlint

      - name: SwiftFormat (lint mode)
        run: swiftformat --lint .

      # Default rule set, default severities: warnings are reported but do not
      # fail the build; only error-severity violations block CI.
      - name: SwiftLint
        run: swiftlint lint

  build-test:
    name: Build & Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build & Test
        run: |
          xcodebuild \
            -project DSContainerManager.xcodeproj \
            -scheme DSContainerManager \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -skipMacroValidation \
            clean test
