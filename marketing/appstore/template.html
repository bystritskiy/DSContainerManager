<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DSContainerManager App Store Shot</title>
  <style>
    :root {
      --bg: #f6f9ff;
      --bg2: #d7f1e5;
      --ink: #08111f;
      --muted: #506070;
      --accent: #1688ff;
      --accent2: #2ecc71;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 1320px;
      height: 2868px;
      margin: 0;
      overflow: hidden;
      font-family: var(--font);
      color: var(--ink);
      background: var(--bg);
    }

    body {
      position: relative;
    }

    .canvas {
      position: relative;
      width: 1320px;
      height: 2868px;
      padding: 132px 112px 0;
      overflow: hidden;
      isolation: isolate;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--bg), white 22%) 0%, var(--bg2) 100%);
    }

    .canvas::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -3;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.42) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 255, 255, 0.42) 1px, transparent 1px);
      background-size: 88px 88px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.08) 72%, transparent);
    }

    .canvas::after {
      content: "";
      position: absolute;
      left: -140px;
      right: -140px;
      bottom: -180px;
      height: 1040px;
      z-index: -2;
      background:
        linear-gradient(150deg, color-mix(in srgb, var(--accent), transparent 52%), transparent 42%),
        linear-gradient(25deg, color-mix(in srgb, var(--accent2), transparent 48%), transparent 54%);
      transform: skewY(-7deg);
      opacity: 0.72;
    }

    .copy {
      position: relative;
      z-index: 2;
      max-width: 1100px;
    }

    h1 {
      margin: 0;
      max-width: 1060px;
      font-size: 104px;
      line-height: 0.92;
      font-weight: 820;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 34px 0 0;
      max-width: 1040px;
      font-size: 48px;
      line-height: 1.12;
      font-weight: 620;
      letter-spacing: 0;
      color: var(--muted);
    }

    .stage {
      position: absolute;
      left: 78px;
      right: 78px;
      bottom: 30px;
      height: 2240px;
      z-index: 1;
    }

    .device-shadow {
      position: absolute;
      inset: auto 62px -26px 62px;
      height: 180px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.24);
      filter: blur(54px);
      opacity: 0.48;
    }

    .phone {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 930px;
      height: 2020px;
      transform: translateX(-50%);
      z-index: 2;
      border-radius: 140px;
      padding: 27px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.54)),
        linear-gradient(145deg, color-mix(in srgb, var(--accent), white 24%), color-mix(in srgb, var(--accent2), white 38%));
      box-shadow:
        0 48px 140px rgba(4, 15, 30, 0.24),
        inset 0 0 0 2px rgba(255, 255, 255, 0.84);
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 130px;
      border: 2px solid rgba(9, 20, 34, 0.08);
      pointer-events: none;
      z-index: 3;
    }

    .screen {
      width: 100%;
      height: 100%;
      border-radius: 112px;
      overflow: hidden;
      background: white;
      box-shadow: inset 0 0 0 1px rgba(9, 20, 34, 0.08);
    }

    .screen img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .callout {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 26px;
      z-index: 4;
      max-width: 548px;
      min-height: 142px;
      padding: 32px 38px;
      border-radius: 44px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid rgba(255, 255, 255, 0.74);
      box-shadow: 0 24px 70px rgba(8, 19, 34, 0.11);
      backdrop-filter: blur(18px);
      font-size: 40px;
      font-weight: 780;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .callout.left {
      left: 0;
      top: -35px;
    }

    .callout.right {
      right: 0;
      top: -35px;
    }

    .dot {
      flex: 0 0 auto;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 14px color-mix(in srgb, var(--accent), transparent 82%);
    }

    .ribbon {
      position: absolute;
      left: 78px;
      right: 78px;
      bottom: 332px;
      height: 210px;
      z-index: -1;
      border-radius: 64px;
      background:
        linear-gradient(90deg, color-mix(in srgb, var(--accent), transparent 40%), color-mix(in srgb, var(--accent2), transparent 38%));
      transform: rotate(-4deg);
      opacity: 0.84;
      box-shadow: 0 40px 120px rgba(9, 20, 34, 0.12);
    }
  </style>
</head>
<body>
  <main class="canvas" id="canvas">
    <section class="copy">
      <h1 id="title"></h1>
      <p class="subtitle" id="subtitle"></p>
    </section>

    <section class="stage">
      <div class="ribbon"></div>
      <div class="callout left"><span class="dot"></span><span id="left-callout"></span></div>
      <div class="callout right"><span class="dot"></span><span id="right-callout"></span></div>
      <div class="device-shadow"></div>
      <div class="phone">
        <div class="screen">
          <img id="screenshot" alt="" />
        </div>
      </div>
    </section>
  </main>

  <script>
    window.renderShot = function renderShot(shot) {
      const root = document.documentElement;
      for (const [key, value] of Object.entries(shot.theme)) {
        root.style.setProperty(`--${key}`, value);
      }

      document.getElementById("title").textContent = shot.title;
      document.getElementById("subtitle").textContent = shot.subtitle;
      document.getElementById("screenshot").src = shot.source;
      document.getElementById("left-callout").textContent = shot.callouts?.[0] || "Native iOS controls";
      document.getElementById("right-callout").textContent = shot.callouts?.[1] || "No DSM browser needed";
    };
  </script>
</body>
</html>
