<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DSContainer App Store Shot</title>
  <style>
    :root {
      --bg: #0a0c10;
      --bg2: #10141c;
      --surface: #12151c;
      --border: rgba(255, 255, 255, 0.08);
      --ink: #e8ebf1;
      --muted: #8b93a1;
      --accent: #3ba4ff;
      --accent2: #2563eb;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 1320px;
      height: 2868px;
      margin: 0;
      overflow: hidden;
      font-family: var(--font);
      color: var(--ink);
      background: var(--bg);
    }

    body {
      position: relative;
    }

    .canvas {
      position: relative;
      width: 1320px;
      height: 2868px;
      padding: 132px 112px 0;
      overflow: hidden;
      isolation: isolate;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    }

    /* ambient glow — same recipe as the landing page hero */
    .canvas::before {
      content: "";
      position: absolute;
      top: -620px;
      left: 50%;
      transform: translateX(-50%);
      width: 2200px;
      height: 1500px;
      z-index: -2;
      background: radial-gradient(
        ellipse at center,
        color-mix(in srgb, var(--accent2), transparent 72%),
        color-mix(in srgb, var(--accent), transparent 91%) 40%,
        transparent 70%
      );
    }

    /* faint blueprint grid, fading down */
    .canvas::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -3;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
      background-size: 88px 88px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.12) 68%, transparent);
    }

    .copy {
      position: relative;
      z-index: 2;
      max-width: 1100px;
    }

    h1 {
      margin: 0;
      max-width: 1060px;
      font-size: 104px;
      line-height: 0.96;
      font-weight: 760;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .subtitle {
      margin: 34px 0 0;
      max-width: 1020px;
      font-size: 48px;
      line-height: 1.16;
      font-weight: 560;
      letter-spacing: -0.005em;
      color: var(--muted);
    }

    .stage {
      position: absolute;
      left: 78px;
      right: 78px;
      bottom: 30px;
      height: 2240px;
      z-index: 1;
    }

    .device-shadow {
      position: absolute;
      inset: auto 62px -26px 62px;
      height: 180px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.7);
      filter: blur(54px);
      opacity: 0.8;
    }

    .phone {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 930px;
      height: 2020px;
      transform: translateX(-50%);
      z-index: 2;
      border-radius: 140px;
      padding: 27px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.03) 55%),
        linear-gradient(145deg, #22262e, #14171d);
      box-shadow:
        0 48px 140px rgba(0, 0, 0, 0.6),
        inset 0 0 0 2px rgba(255, 255, 255, 0.12);
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 130px;
      border: 2px solid rgba(255, 255, 255, 0.07);
      pointer-events: none;
      z-index: 3;
    }

    .screen {
      width: 100%;
      height: 100%;
      border-radius: 112px;
      overflow: hidden;
      background: var(--bg);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .screen img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .callout {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 26px;
      z-index: 4;
      max-width: 548px;
      min-height: 142px;
      padding: 32px 38px;
      border-radius: 44px;
      color: var(--ink);
      background: rgba(18, 21, 28, 0.78);
      border: 1px solid var(--border);
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(18px);
      font-size: 40px;
      font-weight: 640;
      line-height: 1.05;
      letter-spacing: -0.005em;
    }

    .callout.left {
      left: 0;
      top: -35px;
    }

    .callout.right {
      right: 0;
      top: -35px;
    }

    .dot {
      flex: 0 0 auto;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow:
        0 0 0 14px color-mix(in srgb, var(--accent), transparent 84%),
        0 0 34px color-mix(in srgb, var(--accent), transparent 40%);
    }

  </style>
</head>
<body>
  <main class="canvas" id="canvas">
    <section class="copy">
      <h1 id="title"></h1>
      <p class="subtitle" id="subtitle"></p>
    </section>

    <section class="stage">
      <div class="callout left"><span class="dot"></span><span id="left-callout"></span></div>
      <div class="callout right"><span class="dot"></span><span id="right-callout"></span></div>
      <div class="device-shadow"></div>
      <div class="phone">
        <div class="screen">
          <img id="screenshot" alt="" />
        </div>
      </div>
    </section>
  </main>

  <script>
    window.renderShot = function renderShot(shot) {
      const root = document.documentElement;
      for (const [key, value] of Object.entries(shot.theme)) {
        root.style.setProperty(`--${key}`, value);
      }

      document.getElementById("title").textContent = shot.title;
      document.getElementById("subtitle").textContent = shot.subtitle;
      document.getElementById("screenshot").src = shot.source;
      document.getElementById("left-callout").textContent = shot.callouts?.[0] || "Native iOS controls";
      document.getElementById("right-callout").textContent = shot.callouts?.[1] || "No DSM browser needed";
    };
  </script>
</body>
</html>
